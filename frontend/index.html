<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telangana Coal Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>⛏️ Telangana Coal Chatbot</h1>
            <p>Ask anything about coal in Telangana</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <span class="avatar">🤖</span>
                <div class="content">
                    Hello! I can answer questions about:
                    <ul>
                        <li>Singareni Collieries (SCCL)</li>
                        <li>Coal reserves</li>
                        <li>Mining technology</li>
                        <li>Minerals in Telangana</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your question...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
